name: Apply full Nueronce naming migration

on:
  push:
    branches:
      - agent/apply-full-nueronce-migration
  pull_request:
    branches:
      - claude/new-session-tkjr3b
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Clone migration branch without marketplace actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout agent/apply-full-nueronce-migration

      - name: Apply, verify, and commit full migration
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          python3 scripts/migrate_to_nueronce.py
          python3 -m compileall -q nueronce
          test -d nueronce
          test -d nueronce/engine
          test -f nueronce/engine/nueronce_model.py
          test -f nueronce/engine/nueronce_blocks.py
          test ! -e cfna
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          excluded = {'.git', '.pytest_cache', '__pycache__'}
          legacy = ('cfna', 'microtorch', 'MicroCFNAModel', 'MicroCFNAConfig')
          violations = []
          text_extensions = {
              '.py', '.md', '.json', '.jsonl', '.yaml', '.yml', '.toml',
              '.txt', '.rst', '.ini', '.cfg', '.sh', '.ps1', '.bat',
              '.ipynb', '.csv', '.tsv', '.html', '.js', '.ts', '.cpp',
              '.cc', '.c', '.h', '.hpp'
          }
          for path in root.rglob('*'):
              if any(part in excluded for part in path.parts):
                  continue
              relative = path.as_posix()
              if any(term.lower() in relative.lower() for term in legacy):
                  violations.append(f'path: {relative}')
              if not path.is_file() or path.suffix.lower() not in text_extensions:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              if any(term.lower() in text.lower() for term in legacy):
                  violations.append(f'text: {relative}')
          if violations:
              raise SystemExit('Legacy naming remains:\n' + '\n'.join(violations[:200]))
          print('Repository-wide Nueronce naming verification passed.')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Migration already applied."
            exit 0
          fi
          git commit -m "Apply full repository identity migration to Nueronce"
          git push origin HEAD:agent/apply-full-nueronce-migration
