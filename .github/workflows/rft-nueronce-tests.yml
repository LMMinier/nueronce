name: RFT NUERONCE tests

on:
  push:
    branches:
      - agent/rft-nueronce-355m-ablation
  pull_request:
    branches:
      - claude/new-session-tkjr3b
    paths:
      - "nueronce/engine/rft_attention.py"
      - "scripts/train_nueronce_engine_355m_base_rft.py"
      - "tests/test_engine_rft_attention.py"
      - "docs/RFT_NUERONCE_355M_ABLATION.md"
      - ".github/workflows/rft-nueronce-tests.yml"

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run RFT attention tests
        run: python -m pytest -q tests/test_engine_rft_attention.py
      - name: Run adjacent engine tests
        run: python -m pytest -q tests/test_nueronce_engine.py tests/test_nueronce_engine_nueronce_model.py

  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run full test suite
        run: python -m pytest -q
